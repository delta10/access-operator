---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - access.k8s.delta10.nl
  resources:
  - controllers
  - cronjobs
  - postgresaccesses
  - rabbitmqaccesses
  - redisaccesses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - access.k8s.delta10.nl
  resources:
  - controllers/finalizers
  - cronjobs/finalizers
  - postgresaccesses/finalizers
  - rabbitmqaccesses/finalizers
  - redisaccesses/finalizers
  verbs:
  - update
- apiGroups:
  - access.k8s.delta10.nl
  resources:
  - controllers/status
  - cronjobs/status
  - postgresaccesses/status
  - rabbitmqaccesses/status
  - redisaccesses/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
